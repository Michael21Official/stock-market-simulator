spring:
  application:
    name: stock-market-simulator
  datasource:
    url: jdbc:postgresql://localhost:5432/stockdb
    username: user
    password: pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    enabled: true
  model-and-view-allowed: true
  show-actuator: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  metrics:
    distribution:
      slo:
        http.server.requests: 10ms, 50ms, 100ms, 500ms
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - [%X{requestId}] %msg%n"
  level:
    com.remitly.stockmarket: DEBUG
    org.springframework.retry: DEBUG
