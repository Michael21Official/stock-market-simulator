events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_status 429;

    upstream backend {
        server app1:8080 max_fails=3 fail_timeout=30s;
        server app2:8080 max_fails=3 fail_timeout=30s;
        server app3:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 8080;
        client_max_body_size 10M;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;

        location /actuator/health {
            proxy_pass http://backend/actuator/health;
            access_log off;
        }

        location /actuator/prometheus {
            proxy_pass http://backend/actuator/prometheus;
            access_log off;
        }

        location /swagger-ui {
            proxy_pass http://backend/swagger-ui;
            proxy_set_header Host $host;
            access_log off;
        }

        location /swagger-ui/ {
            proxy_pass http://backend/swagger-ui/;
            proxy_set_header Host $host;
            access_log off;
        }

        location /v3/api-docs {
            proxy_pass http://backend/v3/api-docs;
            proxy_set_header Host $host;
            access_log off;
        }

        location /v3/api-docs/ {
            proxy_pass http://backend/v3/api-docs/;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            if ($http_x_api_key != "remitly-internship-2026-secret-key") {
                return 401 '{"error":"Invalid or missing API Key","status":401}';
            }
            add_header Content-Type application/json;

            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }
    }
}